name: Morning Watchlist Scan

on:
  schedule:
    # 15:00 UTC = 8:00 AM PDT (summer) / 16:00 UTC = 8:00 AM PST (winter)
    - cron: '0 15 * * 1-5'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run morning scan & send email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: node scripts/morning-scan.mjs
